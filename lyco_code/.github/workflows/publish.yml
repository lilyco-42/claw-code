name: Build and Publish lyco_code

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: claw

jobs:
  # ── 1. 多平台构建 ──────────────────────────────────────────────
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: claw-x86_64-unknown-linux-gnu
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: claw-aarch64-unknown-linux-gnu
            ext: ""
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: claw-x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: claw-aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: claw-x86_64-pc-windows-msvc.exe
            ext: ".exe"

    steps:
      - name: Checkout upstream claw-code
        uses: actions/checkout@v4
        with:
          repository: ultraworkers/claw-code
          ref: main

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          key: ${{ matrix.target }}

      - name: Build (native)
        if: matrix.cross != true
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }} -p rusty-claude-cli

      - name: Build (cross)
        if: matrix.cross == true
        working-directory: rust
        run: cross build --release --target ${{ matrix.target }} -p rusty-claude-cli

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp "rust/target/${{ matrix.target }}/release/claw${{ matrix.ext }}" \
             "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  # ── 2. 发布到 crates.io（仅 tag push）─────────────────────────
  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout upstream claw-code
        uses: actions/checkout@v4
        with:
          repository: ultraworkers/claw-code
          ref: main

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Publish lyco_code to crates.io
        working-directory: rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN" -p rusty-claude-cli --no-verify

  # ── 3. 创建 GitHub Release + 上传所有平台二进制 ───────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create Release with all binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
